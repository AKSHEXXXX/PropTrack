services:
  db:
    image: postgres:16-alpine
    container_name: proptrack_db
    environment:
      POSTGRES_USER: proptrack
      POSTGRES_PASSWORD: proptrack_secret
      POSTGRES_DB: proptrack_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/database/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proptrack -d proptrack_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proptrack_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: proptrack
      DB_PASSWORD: proptrack_secret
      DB_DATABASE: proptrack_db
      JWT_SECRET: dev_jwt_secret
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/docs || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
